<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการงานในมือ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --surface: #ffffff;
      --surface-soft: #eef5f0;
      --ink: #172126;
      --muted: #68767b;
      --line: #dbe2df;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --amber: #b7791f;
      --rose: #be123c;
      --blue: #2563eb;
      --shadow: 0 14px 40px rgba(23, 33, 38, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(15, 118, 110, 0.12), transparent 34%),
        linear-gradient(210deg, rgba(183, 121, 31, 0.12), transparent 30%),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .brand-mark {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .nav-list {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    .nav-button,
    .ghost-button,
    .primary-button,
    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 8px;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .nav-button {
      justify-content: flex-start;
      width: 100%;
      padding: 9px 12px;
      background: transparent;
      color: var(--muted);
      text-align: left;
    }

    .nav-button.is-active,
    .nav-button:hover {
      background: #fff;
      color: var(--brand-dark);
      border-color: var(--line);
    }

    .nav-icon,
    .button-icon {
      width: 18px;
      text-align: center;
      font-weight: 800;
      line-height: 1;
    }

    .quick-stats {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .stat-tile {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    .stat-tile b {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .stat-tile span {
      color: var(--muted);
      font-size: 13px;
    }

    .main {
      min-width: 0;
      padding: 26px clamp(16px, 3vw, 36px) 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .page-title h2 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: 0;
      line-height: 1.08;
    }

    .page-title p {
      margin: 7px 0 0;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .primary-button {
      padding: 0 14px;
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.22);
    }

    .primary-button:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .ghost-button,
    .icon-button {
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.75);
      color: var(--ink);
      border-color: var(--line);
    }

    .icon-button {
      width: 40px;
      padding: 0;
    }

    .ghost-button:hover,
    .icon-button:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(140px, 170px));
      gap: 10px;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 9px 11px;
      outline: none;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .insight-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .insight {
      min-height: 92px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 8px 24px rgba(23, 33, 38, 0.07);
    }

    .insight span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .insight strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      line-height: 1;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      align-items: start;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      min-width: 0;
    }

    .column {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      overflow: hidden;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 13px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .column-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .count-pill {
      min-width: 28px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--brand-dark);
      text-align: center;
      font-weight: 800;
      font-size: 13px;
    }

    .task-list {
      display: grid;
      gap: 10px;
      min-height: 260px;
      padding: 12px;
    }

    .task-list.is-over {
      background: rgba(15, 118, 110, 0.07);
    }

    .task-card {
      display: grid;
      gap: 9px;
      padding: 12px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--brand);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(23, 33, 38, 0.08);
    }

    .task-card[draggable="true"] {
      cursor: grab;
    }

    .task-card.is-dragging {
      opacity: 0.54;
    }

    .task-card.priority-high {
      border-left-color: var(--rose);
    }

    .task-card.priority-medium {
      border-left-color: var(--amber);
    }

    .task-card.priority-low {
      border-left-color: var(--blue);
    }

    .task-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .task-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.35;
    }

    .task-menu {
      display: flex;
      gap: 4px;
      flex: 0 0 auto;
    }

    .mini-button {
      display: inline-grid;
      width: 30px;
      height: 30px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
    }

    .mini-button:hover {
      color: var(--ink);
      border-color: var(--brand);
    }

    .task-notes {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f3f5f4;
      color: #435156;
      font-size: 12px;
      font-weight: 700;
    }

    .tag.due-soon {
      background: #fff4dd;
      color: #8a560f;
    }

    .tag.overdue {
      background: #ffe5ec;
      color: #9f1239;
    }

    .side-panel {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 24px rgba(23, 33, 38, 0.07);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .panel-body {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .compact-task {
      display: grid;
      gap: 4px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .compact-task:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .compact-task b {
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    .compact-task span,
    .empty-state {
      color: var(--muted);
      font-size: 13px;
    }

    .progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e7ece9;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--brand), #55a630);
      transition: width 0.2s ease;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(23, 33, 38, 0.42);
      z-index: 20;
    }

    .modal.is-open {
      display: grid;
    }

    .dialog {
      width: min(640px, 100%);
      max-height: min(720px, calc(100vh - 40px));
      overflow: auto;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 30px 70px rgba(23, 33, 38, 0.25);
    }

    .dialog-header,
    .dialog-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-footer {
      justify-content: flex-end;
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .dialog-header h3 {
      margin: 0;
      font-size: 20px;
    }

    .task-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .task-form .wide {
      grid-column: 1 / -1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 1120px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        padding: 16px;
      }

      .nav-list,
      .quick-stats {
        display: none;
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 840px) {
      .topbar,
      .toolbar,
      .insight-strip,
      .board {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: stretch;
      }

      .top-actions > * {
        flex: 1;
      }
    }

    @media (max-width: 560px) {
      .main {
        padding: 18px 12px 26px;
      }

      .sidebar {
        grid-template-columns: 1fr;
      }

      .task-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">W</div>
        <div>
          <h1>งานในมือ</h1>
          <p id="todayLabel">วันนี้</p>
        </div>
      </div>

      <nav class="nav-list" aria-label="มุมมอง">
        <button class="nav-button is-active" type="button" data-status-filter="all"><span class="nav-icon">A</span>ทั้งหมด</button>
        <button class="nav-button" type="button" data-status-filter="todo"><span class="nav-icon">T</span>รอทำ</button>
        <button class="nav-button" type="button" data-status-filter="doing"><span class="nav-icon">P</span>กำลังทำ</button>
        <button class="nav-button" type="button" data-status-filter="done"><span class="nav-icon">D</span>เสร็จแล้ว</button>
      </nav>

      <div class="quick-stats" aria-label="สรุปย่อ">
        <div class="stat-tile">
          <b id="sideOpenCount">0</b>
          <span>งานเปิดอยู่</span>
        </div>
        <div class="stat-tile">
          <b id="sideDueCount">0</b>
          <span>ถึงกำหนด</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">
          <h2>จัดการงานในมือ</h2>
          <p>คุมงานประจำวัน ลำดับความสำคัญ และกำหนดส่งในหน้าจอเดียว</p>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="exportButton" type="button" title="ส่งออกข้อมูล"><span class="button-icon">E</span>ส่งออก</button>
          <button class="ghost-button" id="importButton" type="button" title="นำเข้าข้อมูล"><span class="button-icon">I</span>นำเข้า</button>
          <button class="primary-button" id="addTaskButton" type="button"><span class="button-icon">+</span>เพิ่มงาน</button>
        </div>
      </header>

      <section class="toolbar" aria-label="ตัวกรอง">
        <div class="field">
          <label for="searchInput">ค้นหา</label>
          <input id="searchInput" type="search" placeholder="ชื่องาน ผู้รับผิดชอบ หรือหมายเหตุ">
        </div>
        <div class="field">
          <label for="priorityFilter">ความสำคัญ</label>
          <select id="priorityFilter">
            <option value="all">ทั้งหมด</option>
            <option value="high">สูง</option>
            <option value="medium">กลาง</option>
            <option value="low">ต่ำ</option>
          </select>
        </div>
        <div class="field">
          <label for="ownerFilter">ผู้รับผิดชอบ</label>
          <select id="ownerFilter">
            <option value="all">ทั้งหมด</option>
          </select>
        </div>
        <div class="field">
          <label for="sortSelect">เรียงตาม</label>
          <select id="sortSelect">
            <option value="due">กำหนดส่ง</option>
            <option value="priority">ความสำคัญ</option>
            <option value="updated">แก้ไขล่าสุด</option>
          </select>
        </div>
      </section>

      <section class="insight-strip" aria-label="ภาพรวม">
        <article class="insight">
          <span>งานทั้งหมด</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="insight">
          <span>กำลังทำ</span>
          <strong id="doingCount">0</strong>
        </article>
        <article class="insight">
          <span>ครบกำหนดวันนี้</span>
          <strong id="todayCount">0</strong>
        </article>
        <article class="insight">
          <span>เสร็จแล้ว</span>
          <strong id="doneCount">0</strong>
        </article>
      </section>

      <section class="workspace">
        <div class="board" id="board" aria-label="บอร์ดงาน">
          <section class="column" aria-labelledby="todoTitle">
            <div class="column-header">
              <h3 id="todoTitle">รอทำ</h3>
              <span class="count-pill" id="todoCount">0</span>
            </div>
            <div class="task-list" data-status="todo"></div>
          </section>
          <section class="column" aria-labelledby="doingTitle">
            <div class="column-header">
              <h3 id="doingTitle">กำลังทำ</h3>
              <span class="count-pill" id="doingColumnCount">0</span>
            </div>
            <div class="task-list" data-status="doing"></div>
          </section>
          <section class="column" aria-labelledby="doneTitle">
            <div class="column-header">
              <h3 id="doneTitle">เสร็จแล้ว</h3>
              <span class="count-pill" id="doneColumnCount">0</span>
            </div>
            <div class="task-list" data-status="done"></div>
          </section>
        </div>

        <aside class="side-panel">
          <section class="panel">
            <div class="panel-header">
              <h3>ความคืบหน้า</h3>
              <strong id="progressText">0%</strong>
            </div>
            <div class="panel-body">
              <div class="progress-track" aria-hidden="true">
                <div class="progress-bar" id="progressBar"></div>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h3>ใกล้กำหนด</h3>
              <button class="icon-button" id="clearDoneButton" type="button" title="ล้างงานที่เสร็จแล้ว">C</button>
            </div>
            <div class="panel-body" id="dueSoonList"></div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <div class="modal" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="dialog">
      <div class="dialog-header">
        <h3 id="modalTitle">เพิ่มงาน</h3>
        <button class="icon-button" id="closeModalButton" type="button" title="ปิด">X</button>
      </div>
      <form class="task-form" id="taskForm">
        <input type="hidden" id="taskId">
        <div class="field wide">
          <label for="taskTitle">ชื่องาน</label>
          <input id="taskTitle" required maxlength="120" placeholder="เช่น โทรยืนยันรอบส่งสินค้า">
        </div>
        <div class="field">
          <label for="taskOwner">ผู้รับผิดชอบ</label>
          <input id="taskOwner" maxlength="80" placeholder="ชื่อทีม/ชื่อคน">
        </div>
        <div class="field">
          <label for="taskDue">กำหนดส่ง</label>
          <input id="taskDue" type="date">
        </div>
        <div class="field">
          <label for="taskPriority">ความสำคัญ</label>
          <select id="taskPriority">
            <option value="high">สูง</option>
            <option value="medium" selected>กลาง</option>
            <option value="low">ต่ำ</option>
          </select>
        </div>
        <div class="field">
          <label for="taskStatus">สถานะ</label>
          <select id="taskStatus">
            <option value="todo">รอทำ</option>
            <option value="doing">กำลังทำ</option>
            <option value="done">เสร็จแล้ว</option>
          </select>
        </div>
        <div class="field wide">
          <label for="taskNotes">หมายเหตุ</label>
          <textarea id="taskNotes" maxlength="400" placeholder="รายละเอียดสั้น ๆ"></textarea>
        </div>
        <div class="dialog-footer wide">
          <button class="ghost-button" id="cancelButton" type="button">ยกเลิก</button>
          <button class="primary-button" type="submit">บันทึก</button>
        </div>
      </form>
    </div>
  </div>

  <input class="sr-only" id="fileInput" type="file" accept="application/json">

  <script>
    const STORAGE_KEY = "workbench.tasks.v1";

    const statusLabels = {
      todo: "รอทำ",
      doing: "กำลังทำ",
      done: "เสร็จแล้ว"
    };

    const priorityLabels = {
      high: "สูง",
      medium: "กลาง",
      low: "ต่ำ"
    };

    const priorityRank = {
      high: 1,
      medium: 2,
      low: 3
    };

    const createId = () => {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `task-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    };

    const sampleTasks = [
      {
        id: createId(),
        title: "ตรวจรายการงานค้างประจำวัน",
        owner: "ทีมปฏิบัติการ",
        due: todayOffset(0),
        priority: "high",
        status: "todo",
        notes: "สรุปรายการที่ต้องปิดก่อนจบวัน",
        createdAt: Date.now() - 4600000,
        updatedAt: Date.now() - 4600000
      },
      {
        id: createId(),
        title: "ติดตามเอกสารที่รอลูกค้ายืนยัน",
        owner: "แอดมิน",
        due: todayOffset(1),
        priority: "medium",
        status: "doing",
        notes: "เช็กสถานะและใส่หมายเหตุล่าสุด",
        createdAt: Date.now() - 8600000,
        updatedAt: Date.now() - 2600000
      },
      {
        id: createId(),
        title: "จัดคิวงานใหม่หลังประชุมเช้า",
        owner: "หัวหน้าทีม",
        due: todayOffset(2),
        priority: "low",
        status: "done",
        notes: "ย้ายงานเร่งด่วนขึ้นก่อน",
        createdAt: Date.now() - 12600000,
        updatedAt: Date.now() - 900000
      }
    ];

    let tasks = loadTasks();
    let activeStatusFilter = "all";
    let draggedTaskId = null;

    const elements = {
      todayLabel: document.getElementById("todayLabel"),
      addTaskButton: document.getElementById("addTaskButton"),
      taskModal: document.getElementById("taskModal"),
      closeModalButton: document.getElementById("closeModalButton"),
      cancelButton: document.getElementById("cancelButton"),
      taskForm: document.getElementById("taskForm"),
      taskId: document.getElementById("taskId"),
      taskTitle: document.getElementById("taskTitle"),
      taskOwner: document.getElementById("taskOwner"),
      taskDue: document.getElementById("taskDue"),
      taskPriority: document.getElementById("taskPriority"),
      taskStatus: document.getElementById("taskStatus"),
      taskNotes: document.getElementById("taskNotes"),
      searchInput: document.getElementById("searchInput"),
      priorityFilter: document.getElementById("priorityFilter"),
      ownerFilter: document.getElementById("ownerFilter"),
      sortSelect: document.getElementById("sortSelect"),
      exportButton: document.getElementById("exportButton"),
      importButton: document.getElementById("importButton"),
      fileInput: document.getElementById("fileInput"),
      clearDoneButton: document.getElementById("clearDoneButton"),
      dueSoonList: document.getElementById("dueSoonList"),
      progressBar: document.getElementById("progressBar"),
      progressText: document.getElementById("progressText")
    };

    elements.todayLabel.textContent = new Intl.DateTimeFormat("th-TH", {
      weekday: "long",
      day: "numeric",
      month: "short",
      year: "numeric"
    }).format(new Date());

    elements.addTaskButton.addEventListener("click", () => openModal());
    elements.closeModalButton.addEventListener("click", closeModal);
    elements.cancelButton.addEventListener("click", closeModal);
    elements.taskModal.addEventListener("click", (event) => {
      if (event.target === elements.taskModal) closeModal();
    });

    elements.taskForm.addEventListener("submit", saveTaskFromForm);
    elements.searchInput.addEventListener("input", render);
    elements.priorityFilter.addEventListener("change", render);
    elements.ownerFilter.addEventListener("change", render);
    elements.sortSelect.addEventListener("change", render);
    elements.exportButton.addEventListener("click", exportTasks);
    elements.importButton.addEventListener("click", () => elements.fileInput.click());
    elements.fileInput.addEventListener("change", importTasks);
    elements.clearDoneButton.addEventListener("click", clearDoneTasks);

    document.querySelectorAll("[data-status-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        activeStatusFilter = button.dataset.statusFilter;
        document.querySelectorAll("[data-status-filter]").forEach((item) => item.classList.remove("is-active"));
        button.classList.add("is-active");
        render();
      });
    });

    document.querySelectorAll(".task-list").forEach((list) => {
      list.addEventListener("dragover", (event) => {
        event.preventDefault();
        list.classList.add("is-over");
      });
      list.addEventListener("dragleave", () => list.classList.remove("is-over"));
      list.addEventListener("drop", () => {
        list.classList.remove("is-over");
        moveTask(draggedTaskId, list.dataset.status);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && elements.taskModal.classList.contains("is-open")) closeModal();
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        elements.searchInput.focus();
      }
    });

    render();

    function todayOffset(days) {
      const date = new Date();
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function loadTasks() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(stored) ? stored : sampleTasks;
      } catch {
        return sampleTasks;
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function render() {
      renderOwnerFilter();
      const visibleTasks = getVisibleTasks();
      document.querySelectorAll(".task-list").forEach((list) => {
        const status = list.dataset.status;
        const columnTasks = visibleTasks.filter((task) => task.status === status);
        list.innerHTML = "";
        if (!columnTasks.length) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = "ยังไม่มีงาน";
          list.append(empty);
          return;
        }
        columnTasks.forEach((task) => list.append(createTaskCard(task)));
      });
      renderCounts(visibleTasks);
      renderDueSoon();
      renderProgress();
    }

    function getVisibleTasks() {
      const term = elements.searchInput.value.trim().toLowerCase();
      const priority = elements.priorityFilter.value;
      const owner = elements.ownerFilter.value;
      const sortBy = elements.sortSelect.value;

      return tasks
        .filter((task) => activeStatusFilter === "all" || task.status === activeStatusFilter)
        .filter((task) => priority === "all" || task.priority === priority)
        .filter((task) => owner === "all" || task.owner === owner)
        .filter((task) => {
          if (!term) return true;
          return [task.title, task.owner, task.notes].some((value) => String(value || "").toLowerCase().includes(term));
        })
        .sort((a, b) => {
          if (sortBy === "priority") return priorityRank[a.priority] - priorityRank[b.priority] || compareDue(a, b);
          if (sortBy === "updated") return b.updatedAt - a.updatedAt;
          return compareDue(a, b);
        });
    }

    function compareDue(a, b) {
      const left = a.due || "9999-12-31";
      const right = b.due || "9999-12-31";
      return left.localeCompare(right);
    }

    function createTaskCard(task) {
      const card = document.createElement("article");
      card.className = `task-card priority-${task.priority}`;
      card.draggable = true;
      card.dataset.taskId = task.id;
      card.addEventListener("dragstart", () => {
        draggedTaskId = task.id;
        card.classList.add("is-dragging");
      });
      card.addEventListener("dragend", () => {
        draggedTaskId = null;
        card.classList.remove("is-dragging");
      });

      const head = document.createElement("div");
      head.className = "task-head";

      const title = document.createElement("h4");
      title.className = "task-title";
      title.textContent = task.title;

      const menu = document.createElement("div");
      menu.className = "task-menu";

      const editButton = document.createElement("button");
      editButton.className = "mini-button";
      editButton.type = "button";
      editButton.title = "แก้ไข";
      editButton.textContent = "E";
      editButton.addEventListener("click", () => openModal(task));

      const doneButton = document.createElement("button");
      doneButton.className = "mini-button";
      doneButton.type = "button";
      doneButton.title = task.status === "done" ? "เปิดงาน" : "ปิดงาน";
      doneButton.textContent = task.status === "done" ? "U" : "D";
      doneButton.addEventListener("click", () => moveTask(task.id, task.status === "done" ? "todo" : "done"));

      const deleteButton = document.createElement("button");
      deleteButton.className = "mini-button";
      deleteButton.type = "button";
      deleteButton.title = "ลบ";
      deleteButton.textContent = "X";
      deleteButton.addEventListener("click", () => deleteTask(task.id));

      menu.append(editButton, doneButton, deleteButton);
      head.append(title, menu);
      card.append(head);

      if (task.notes) {
        const notes = document.createElement("p");
        notes.className = "task-notes";
        notes.textContent = task.notes;
        card.append(notes);
      }

      const meta = document.createElement("div");
      meta.className = "task-meta";
      meta.append(createTag(priorityLabels[task.priority]));
      meta.append(createTag(task.owner || "ไม่ระบุผู้รับผิดชอบ"));
      if (task.due) meta.append(createTag(formatDue(task.due), dueClass(task.due)));
      meta.append(createTag(statusLabels[task.status]));
      card.append(meta);

      return card;
    }

    function createTag(text, extraClass = "") {
      const tag = document.createElement("span");
      tag.className = `tag ${extraClass}`.trim();
      tag.textContent = text;
      return tag;
    }

    function renderCounts(visibleTasks) {
      const total = tasks.length;
      const done = tasks.filter((task) => task.status === "done").length;
      const doing = tasks.filter((task) => task.status === "doing").length;
      const today = tasks.filter((task) => task.due === todayOffset(0) && task.status !== "done").length;
      const open = tasks.filter((task) => task.status !== "done").length;
      const due = tasks.filter((task) => task.due && task.due <= todayOffset(0) && task.status !== "done").length;

      document.getElementById("totalCount").textContent = total;
      document.getElementById("doingCount").textContent = doing;
      document.getElementById("todayCount").textContent = today;
      document.getElementById("doneCount").textContent = done;
      document.getElementById("sideOpenCount").textContent = open;
      document.getElementById("sideDueCount").textContent = due;

      document.getElementById("todoCount").textContent = visibleTasks.filter((task) => task.status === "todo").length;
      document.getElementById("doingColumnCount").textContent = visibleTasks.filter((task) => task.status === "doing").length;
      document.getElementById("doneColumnCount").textContent = visibleTasks.filter((task) => task.status === "done").length;
    }

    function renderOwnerFilter() {
      const current = elements.ownerFilter.value;
      const owners = [...new Set(tasks.map((task) => task.owner).filter(Boolean))].sort((a, b) => a.localeCompare(b, "th"));
      elements.ownerFilter.innerHTML = '<option value="all">ทั้งหมด</option>';
      owners.forEach((owner) => {
        const option = document.createElement("option");
        option.value = owner;
        option.textContent = owner;
        elements.ownerFilter.append(option);
      });
      elements.ownerFilter.value = owners.includes(current) ? current : "all";
    }

    function renderDueSoon() {
      const dueTasks = tasks
        .filter((task) => task.status !== "done" && task.due)
        .sort(compareDue)
        .slice(0, 5);

      elements.dueSoonList.innerHTML = "";
      if (!dueTasks.length) {
        const empty = document.createElement("p");
        empty.className = "empty-state";
        empty.textContent = "ไม่มีงานใกล้กำหนด";
        elements.dueSoonList.append(empty);
        return;
      }

      dueTasks.forEach((task) => {
        const item = document.createElement("div");
        item.className = "compact-task";
        const title = document.createElement("b");
        title.textContent = task.title;
        const meta = document.createElement("span");
        meta.textContent = `${formatDue(task.due)} · ${task.owner || "ไม่ระบุผู้รับผิดชอบ"}`;
        item.append(title, meta);
        elements.dueSoonList.append(item);
      });
    }

    function renderProgress() {
      const done = tasks.filter((task) => task.status === "done").length;
      const percent = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
      elements.progressBar.style.width = `${percent}%`;
      elements.progressText.textContent = `${percent}%`;
    }

    function openModal(task = null) {
      elements.taskForm.reset();
      document.getElementById("modalTitle").textContent = task ? "แก้ไขงาน" : "เพิ่มงาน";
      elements.taskId.value = task?.id || "";
      elements.taskTitle.value = task?.title || "";
      elements.taskOwner.value = task?.owner || "";
      elements.taskDue.value = task?.due || todayOffset(0);
      elements.taskPriority.value = task?.priority || "medium";
      elements.taskStatus.value = task?.status || "todo";
      elements.taskNotes.value = task?.notes || "";
      elements.taskModal.classList.add("is-open");
      elements.taskTitle.focus();
    }

    function closeModal() {
      elements.taskModal.classList.remove("is-open");
    }

    function saveTaskFromForm(event) {
      event.preventDefault();
      const id = elements.taskId.value;
      const payload = {
        title: elements.taskTitle.value.trim(),
        owner: elements.taskOwner.value.trim(),
        due: elements.taskDue.value,
        priority: elements.taskPriority.value,
        status: elements.taskStatus.value,
        notes: elements.taskNotes.value.trim(),
        updatedAt: Date.now()
      };

      if (!payload.title) return;

      if (id) {
        tasks = tasks.map((task) => task.id === id ? { ...task, ...payload } : task);
      } else {
        tasks.unshift({
          id: createId(),
          ...payload,
          createdAt: Date.now()
        });
      }

      persist();
      closeModal();
      render();
    }

    function moveTask(id, status) {
      if (!id || !status) return;
      tasks = tasks.map((task) => task.id === id ? { ...task, status, updatedAt: Date.now() } : task);
      persist();
      render();
    }

    function deleteTask(id) {
      const task = tasks.find((item) => item.id === id);
      if (!task) return;
      const confirmed = window.confirm(`ลบงาน "${task.title}" ?`);
      if (!confirmed) return;
      tasks = tasks.filter((item) => item.id !== id);
      persist();
      render();
    }

    function clearDoneTasks() {
      const doneCount = tasks.filter((task) => task.status === "done").length;
      if (!doneCount) return;
      const confirmed = window.confirm(`ล้างงานที่เสร็จแล้ว ${doneCount} รายการ ?`);
      if (!confirmed) return;
      tasks = tasks.filter((task) => task.status !== "done");
      persist();
      render();
    }

    function formatDue(dateValue) {
      const today = todayOffset(0);
      if (dateValue === today) return "วันนี้";
      return new Intl.DateTimeFormat("th-TH", {
        day: "numeric",
        month: "short",
        year: "numeric"
      }).format(new Date(`${dateValue}T00:00:00`));
    }

    function dueClass(dateValue) {
      const today = todayOffset(0);
      if (dateValue < today) return "overdue";
      if (dateValue === today) return "due-soon";
      return "";
    }

    function exportTasks() {
      const payload = JSON.stringify({ exportedAt: new Date().toISOString(), tasks }, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `tasks-${todayOffset(0)}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function importTasks(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const imported = Array.isArray(data) ? data : data.tasks;
          if (!Array.isArray(imported)) throw new Error("Invalid task data");
          tasks = imported.map(normalizeTask);
          persist();
          render();
        } catch {
          window.alert("ไฟล์นี้นำเข้าไม่ได้");
        } finally {
          elements.fileInput.value = "";
        }
      };
      reader.readAsText(file);
    }

    function normalizeTask(task) {
      return {
        id: task.id || createId(),
        title: String(task.title || "ไม่มีชื่อ").slice(0, 120),
        owner: String(task.owner || "").slice(0, 80),
        due: task.due || "",
        priority: priorityLabels[task.priority] ? task.priority : "medium",
        status: statusLabels[task.status] ? task.status : "todo",
        notes: String(task.notes || "").slice(0, 400),
        createdAt: Number(task.createdAt || Date.now()),
        updatedAt: Number(task.updatedAt || Date.now())
      };
    }
  </script>
</body>
</html>
